<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Tally</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-mark" style="text-decoration:none;">TALL<span>Y</span></a>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="how-it-works.html">How it works</a></li>
    <li><a href="chat.html">Chat</a></li>
  </ul>
  <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">&#9776;</button>
</nav>

<section class="chat-page">
  <div class="wrap">
    <div class="section-label">Talk to Tally</div>
    <h1 class="section-title">Ask about your week.</h1>

    <div class="chat-shell">
      <div class="chat-head">
        <div class="chat-dot"></div>
        <div class="chat-head-name">Tally</div>
        <div class="chat-head-status" id="chat-status">connecting…</div>
      </div>

      <div class="chat-log" id="chat-log">
        <div class="bubble bot">Hey, I'm Tally. Ask me what's due this week, or tell me about a new task and I'll help you fit it in.</div>
      </div>

      <form class="chat-input-row" id="chat-form">
        <input id="chat-input" type="text" placeholder="e.g. what's due tomorrow?" autocomplete="off">
        <button type="submit" aria-label="Send">↑</button>
      </form>
    </div>
  </div>
</section>

<footer>
  <div class="wrap" style="display:flex; justify-content:space-between; width:100%; flex-wrap:wrap; gap:10px;">
    <span>Tally — Accj Team, C240</span>
    <span>Built by the Accj Team</span>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
